spring:
  application:
    name: shadowdeploy-backend
  datasource:
    url: ${SHADOW_DB_URL:jdbc:mysql://localhost:3306/shadowdeploy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SHADOW_DB_USERNAME:shadow}
    password: ${SHADOW_DB_PASSWORD:shadow}
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080
shadowdeploy:
  llm:
    enabled: ${SHADOW_LLM_ENABLED:false}
    base-url: ${SHADOW_LLM_BASE_URL:https://api.openai.com/v1/chat/completions}
    api-key: ${SHADOW_LLM_API_KEY:}
    model: ${SHADOW_LLM_MODEL:gpt-4o-mini}
    timeout-seconds: ${SHADOW_LLM_TIMEOUT_SECONDS:20}
  replay:
    shadow-base-url: ${SHADOW_REPLAY_SHADOW_BASE_URL:}
    timeout-seconds: ${SHADOW_REPLAY_TIMEOUT_SECONDS:8}
    max-response-bytes: ${SHADOW_REPLAY_MAX_RESPONSE_BYTES:200000}
